name: Plugin compatibility

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  compatibility:
    permissions:
      contents: read
    uses: mindroom-ai/mindroom/.github/workflows/plugin-ci.yml@3a342bef5b1f2dd4b054d80fa5e747df15a675c3
    with:
      plugin_repository: ${{ github.repository }}
      plugin_ref: ${{ github.sha }}
      artifact_name: thread-goal-plugin
      require_tests: true
